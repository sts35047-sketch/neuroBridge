<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NeuroBridge | Analytics Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="{{ url_for('static', filename='theme.css') }}" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@latest"></script>
    <style>
        body { background-color: #180f23; background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 60%); min-height: 100vh; color: #ecddf9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .bionic-glass { background: rgba(24, 15, 35, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(16, 185, 129, 0.2); }
        .holographic-border { border: 1px solid transparent; background: linear-gradient(rgba(24, 15, 35, 0.4), rgba(24, 15, 35, 0.4)) padding-box, linear-gradient(45deg, #10b981, #6ee7b7, #3f354b) border-box; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        canvas { max-height: 100% !important; }
    </style>
</head>
<body class="pb-12">

<header class="fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-5 md:px-8 py-3 bg-[#180f23]/60 backdrop-blur-[24px] rounded-full mt-4 md:mt-6 mx-auto w-[95%] max-w-7xl border border-green-600/20 shadow-[0_0_40px_rgba(16,185,129,0.15)]">
    <div class="flex items-center gap-2 md:gap-3">
        <span class="text-xl md:text-2xl font-black text-[#10b981] tracking-[-0.05em] font-headline">NeuroBridge</span>
    </div>
    <a href="/dashboard" class="px-4 md:px-6 py-2 text-[10px] md:text-xs font-bold uppercase rounded-full bg-white/10 hover:bg-white/20 text-white transition-all border border-white/20">Back to Core</a>
</header>

<main class="pt-28 md:pt-32 px-4 md:px-8 max-w-7xl mx-auto">
    <div class="mb-8 md:mb-10 text-center">
        <h1 class="font-headline text-3xl md:text-5xl font-black text-white tracking-tighter mb-2">Neural <span class="text-[#10b981]">Analytics</span></h1>
        <p class="text-xs md:text-sm text-slate-400 max-w-xl mx-auto">Advanced macro-level data visualization of network supply and demand.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
        <!-- Supply vs Demand Chart -->
        <div class="bionic-glass holographic-border rounded-[2rem] p-6 flex flex-col shadow-lg overflow-hidden" style="min-height: 480px;">
            <h3 class="font-headline text-lg font-bold uppercase tracking-widest text-[#10b981] mb-4 flex-shrink-0">Supply vs Demand Trend</h3>
            <div class="flex-1 relative w-full" style="min-height: 350px;">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- Global Blood Groups Chart -->
        <div class="bionic-glass holographic-border rounded-[2rem] p-6 flex flex-col shadow-lg overflow-hidden" style="min-height: 480px;">
            <h3 class="font-headline text-lg font-bold uppercase tracking-widest text-[#10b981] mb-4 flex-shrink-0">Global Blood Group Distribution</h3>
            <div class="flex-1 relative w-full" style="min-height: 350px;">
                <canvas id="bloodGroupChart"></canvas>
            </div>
        </div>
    </div>
</main>

<script>
    const months = JSON.parse('{{ months | tojson | safe }}');
    const supply = JSON.parse('{{ supply | tojson | safe }}');
    const demand = JSON.parse('{{ demand | tojson | safe }}');
    const bLabels = JSON.parse('{{ b_labels | tojson | safe }}');
    const bValues = JSON.parse('{{ b_values | tojson | safe }}');

    Chart.defaults.color = '#bac9cc';
    Chart.defaults.font.family = "'Space Grotesk', sans-serif";
    Chart.defaults.borderColor = 'rgba(255,255,255,0.1)';

    // Trend Chart
    const trendCtx = document.getElementById('trendChart');
    new Chart(trendCtx, {
        type: 'line',
        data: {
            labels: months,
            datasets: [
                { label: 'Supply (Donors)', data: supply, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', tension: 0.4, fill: true, borderWidth: 3, pointRadius: 5 },
                { label: 'Demand (Recipients)', data: demand, borderColor: '#ef4444', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2, pointRadius: 4 }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            layout: { padding: { top: 10, bottom: 10, left: 10, right: 10 } },
            scales: { 
                y: { 
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    beginAtZero: true
                }, 
                x: { grid: { display: false } } 
            },
            plugins: {
                legend: { display: true, position: 'top', labels: { boxWidth: 15, padding: 15 } }
            }
        }
    });

    // Blood Group Chart
    const bloodCtx = document.getElementById('bloodGroupChart');
    new Chart(bloodCtx, {
        type: 'doughnut',
        data: {
            labels: bLabels,
            datasets: [{ 
                data: bValues, 
                backgroundColor: ['#10b981', '#34d399', '#6ee7b7', '#ec4899', '#f43f5e', '#f59e0b', '#3b82f6', '#14b8a6'], 
                borderWidth: 2,
                borderColor: '#180f23',
                hoverOffset: 10 
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            cutout: '65%',
            layout: { padding: { top: 10, bottom: 10, left: 10, right: 10 } },
            plugins: { 
                legend: { 
                    position: 'right',
                    labels: { boxWidth: 12, padding: 15 }
                }
            }
        }
    });
</script>
</body>
</html>
