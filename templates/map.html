<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NeuroBridge | Global Network Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #180f23; background-image: radial-gradient(at 50% 50%, rgba(0, 229, 255, 0.1) 0px, transparent 80%); min-height: 100vh; color: #ecddf9; font-family: 'Inter', sans-serif; overflow: hidden; }
        .bionic-glass { background: rgba(24, 15, 35, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(0, 229, 255, 0.2); }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        /* Style the folium map wrapper to fit perfectly */
        .map-container iframe { width: 100%; height: 100%; border-radius: 1.5rem; filter: invert(90%) hue-rotate(180deg) brightness(80%) contrast(120%); }
    </style>
</head>
<body class="flex flex-col h-screen">

<header class="fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-5 md:px-8 py-3 bg-[#180f23]/60 backdrop-blur-[24px] rounded-full mt-4 md:mt-6 mx-auto w-[95%] max-w-7xl border border-cyan-500/20 shadow-[0_0_40px_rgba(0,229,255,0.15)]">
    <div class="flex items-center gap-2 md:gap-3">
        <span class="text-xl md:text-2xl font-black text-[#00E5FF] tracking-[-0.05em] font-headline">NeuroBridge</span>
    </div>
    <a href="/dashboard" class="px-4 md:px-6 py-2 text-[10px] md:text-xs font-bold uppercase rounded-full bg-white/10 hover:bg-white/20 text-white transition-all border border-white/20">Back to Core</a>
</header>

<main class="flex-1 pt-28 pb-6 px-4 md:px-8 max-w-7xl mx-auto w-full flex flex-col">
    <div class="mb-4 flex justify-between items-end">
        <div>
            <h1 class="font-headline text-3xl md:text-4xl font-black text-white tracking-tighter mb-1">Grid <span class="text-[#00e5ff]">Topography</span></h1>
            <p class="text-xs md:text-sm text-slate-400">Live geospatial tracking of network nodes and payloads.</p>
        </div>
        <div class="hidden md:flex gap-3">
            <span class="flex items-center text-xs text-slate-400"><div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div> Donors</span>
            <span class="flex items-center text-xs text-slate-400"><div class="w-3 h-3 rounded-full bg-red-500 mr-2"></div> Recipients</span>
        </div>
    </div>

    <!-- Map Container -->
    <div class="flex-1 bionic-glass border border-[#00e5ff]/30 rounded-[2rem] p-2 md:p-4 shadow-[0_0_30px_rgba(0,229,255,0.1)] map-container">
        {{ map_html | safe }}
    </div>
</main>

</body>
</html>
