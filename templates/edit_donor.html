<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Donor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">Edit Donor Details</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-3">
                                <label>Name</label>
                                <input type="text" name="name" class="form-control" value="{{ donor.name }}" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>Age</label>
                                    <input type="number" name="age" class="form-control" value="{{ donor.age }}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label>Blood Group</label>
                                    <select name="blood_group" class="form-select">
                                        <option value="{{ donor.blood_group }}" selected hidden>{{ donor.blood_group }}</option>
                                        <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                                        <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label>Organ</label>
                                <input type="text" name="organ" class="form-control" value="{{ donor.organ }}" required>
                            </div>
                            <div class="mb-3">
                                <label>City</label>
                                <input type="text" name="city" class="form-control" value="{{ donor.city }}" required>
                            </div>
                            <div class="mb-3">
                                <label>Phone</label>
                                <input type="text" name="phone" class="form-control" value="{{ donor.phone }}" required>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100">Update Donor</button>
                            <a href="/dashboard" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
