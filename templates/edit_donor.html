<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NeuroBridge | Edit Donor</title>
    
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#10b981",
                        "on-primary-container": "#064e3b",
                    },
                    fontFamily: {
                        headline: ["Space Grotesk"],
                        body: ["Inter"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #180f23;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(195, 245, 255, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            color: #ecddf9;
        }
        
        .bionic-glass {
            background: rgba(24, 15, 35, 0.4);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .holographic-border {
            border: 1px solid transparent;
            background: linear-gradient(rgba(24, 15, 35, 0.4), rgba(24, 15, 35, 0.4)) padding-box,
                        linear-gradient(45deg, #10b981, #6ee7b7, #3f354b) border-box;
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='responsive-system.css') }}"/></head>
<body class="font-body text-slate-200 flex items-center justify-center min-h-screen px-4">

    <div class="w-full max-w-md">
        <div class="bionic-glass holographic-border rounded-[2rem] p-8 shadow-2xl">
            <div class="flex items-center gap-3 mb-8">
                <span class="material-symbols-outlined text-[#10b981] text-3xl">person</span>
                <h1 class="font-headline text-3xl font-black text-white">Edit Donor</h1>
            </div>
            
            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-[#10b981] mb-2">Name</label>
                    <input type="text" name="name" value="{{ donor.name }}" class="w-full bg-white/5 border border-white/10 text-white rounded-xl px-4 py-2 focus:border-[#10b981] focus:ring-0 transition-colors" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-[#10b981] mb-2">Age</label>
                        <input type="number" name="age" value="{{ donor.age }}" class="w-full bg-white/5 border border-white/10 text-white rounded-xl px-4 py-2 focus:border-[#10b981] focus:ring-0" required>
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-[#10b981] mb-2">Blood Group</label>
                        <select name="blood_group" class="w-full bg-[#2f263b] border border-white/10 text-white rounded-xl px-4 py-2 focus:border-[#10b981] focus:ring-0">
                            <option value="{{ donor.blood_group }}" selected hidden>{{ donor.blood_group }}</option>
                            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                            <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-[#10b981] mb-2">Organ</label>
                    <input type="text" name="organ" value="{{ donor.organ }}" class="w-full bg-white/5 border border-white/10 text-white rounded-xl px-4 py-2 focus:border-[#10b981] focus:ring-0" required>
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-[#10b981] mb-2">Phone</label>
                    <input type="text" name="phone" value="{{ donor.phone }}" class="w-full bg-white/5 border border-white/10 text-white rounded-xl px-4 py-2 focus:border-[#10b981] focus:ring-0" required>
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-[#10b981] mb-2">City</label>
                    <input type="text" name="city" value="{{ donor.city }}" class="w-full bg-white/5 border border-white/10 text-white rounded-xl px-4 py-2 focus:border-[#10b981] focus:ring-0" required>
                </div>
                
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 py-3 rounded-full bg-[#10b981] text-[#064e3b] font-headline font-bold uppercase tracking-widest text-sm shadow-[0_0_20px_rgba(0,229,255,0.3)] hover:bg-white transition-all">
                        Update Profile
                    </button>
                    <a href="/dashboard" class="flex-1 py-3 rounded-full bg-white/10 text-white font-headline font-bold uppercase tracking-widest text-sm hover:bg-white/20 transition-all text-center border border-white/20">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

<script src="{{ url_for('static', filename='responsive-menu.js') }}"></script></body>
</html>
