<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Node Login | NeuroBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #180f23; background-image: radial-gradient(at 50% 50%, rgba(16, 185, 129, 0.1) 0px, transparent 80%); min-height: 100vh; color: #ecddf9; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .bionic-glass { background: rgba(24, 15, 35, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(16, 185, 129, 0.2); }
        .holographic-border { border: 1px solid transparent; background: linear-gradient(rgba(24, 15, 35, 0.6), rgba(24, 15, 35, 0.6)) padding-box, linear-gradient(45deg, #10b981, #6ee7b7, #3f354b) border-box; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body>

    <div class="w-full max-w-md relative">
        <div class="absolute -top-12 -right-12 w-32 h-32 bg-green-600 opacity-10 blur-3xl rounded-full"></div>
        
        <div class="bionic-glass holographic-border rounded-[2.5rem] p-8 md:p-10 shadow-2xl relative z-10 overflow-hidden">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-green-600/10 border border-green-600/30 mb-6">
                    <svg class="w-8 h-8 text-[#10b981]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                </div>
                <h2 class="font-headline text-3xl font-black text-white tracking-tighter leading-none">Access <span class="text-[#10b981]">Node</span></h2>
                <p class="text-slate-400 text-xs mt-3 uppercase tracking-widest font-bold">Grid Authentication Required</p>
            </div>

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-[#10b981] mb-2 ml-1 font-black">Comms ID (Email)</label>
                    <input type="email" name="email" class="w-full bg-black/30 border border-white/10 text-white rounded-2xl px-5 py-4 focus:border-[#10b981] focus:ring-1 focus:ring-[#10b981] transition-all outline-none text-sm placeholder-slate-600" required placeholder="admin@hospital.grid">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-[#10b981] mb-2 ml-1 font-black">Access Key (Password)</label>
                    <input type="password" name="password" class="w-full bg-black/30 border border-white/10 text-white rounded-2xl px-5 py-4 focus:border-[#10b981] focus:ring-1 focus:ring-[#10b981] transition-all outline-none text-sm placeholder-slate-600" required placeholder="••••••••">
                </div>
                <button type="submit" class="w-full py-4 rounded-full bg-[#10b981] text-[#064e3b] font-headline font-bold uppercase tracking-widest text-xs shadow-[0_0_30px_rgba(0,229,255,0.3)] hover:scale-[1.02] hover:bg-white transition-all mt-4">
                    Verify & Enter
                </button>
            </form>

            <div class="mt-10 text-center border-t border-white/5 pt-8">
                <p class="text-slate-400 text-xs">
                    No active node? <a href="/register" class="text-[#10b981] hover:text-white font-bold ml-1 transition-colors underline underline-offset-4 decoration-green-600/30">Establish Facility</a>
                </p>
                <div class="mt-6">
                    <a href="/admin/login" class="text-[9px] uppercase tracking-[0.3em] text-slate-600 hover:text-purple-400 transition-colors font-black">Command Override Login</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
